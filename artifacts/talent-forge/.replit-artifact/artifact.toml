kind = "web"
previewPath = "/"
title = "Talent Forge"
version = "1.0.0"
id = "artifacts/talent-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25859

[services.development]
run = "pnpm --filter @workspace/talent-forge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/talent-forge", "run", "build" ]
publicDir = "artifacts/talent-forge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25859"
BASE_PATH = "/"
